<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IB Study Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/tabler-icons.min.css" />
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<!-- ── Firebase v10 (compat CDN — works without a bundler) ── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #2a52a0;
    --accent-light: #e8edf8;
    --border: #e4e7ed;
    --bg: #f7f8fa;
    --card: #ffffff;
    --sidebar-bg: #ffffff;
    --sidebar-border: #e4e7ed;
    --text: #111318;
    --text-2: #5a5f6e;
    --text-3: #a0a7b8;
    --radius-md: 8px;
    --radius-lg: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-lg: 0 6px 20px rgba(0,0,0,0.1);

    --jpn:   #c0392b;
    --eng:   #6d3ab5;
    --math:  #1a4f9b;
    --phys:  #0f7a52;
    --ess:   #4a8a2a;
    --geo:   #1a7a8a;
    --tok:   #7a3a9a;
    --ee:    #8b4513;
    --cas:   #2e7d32;
    --univ:  #b8860b;
  }

  html { font-size: 16px; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 1.5rem 1.25rem 1.25rem;
    border-bottom: 1px solid var(--sidebar-border);
  }
  .sidebar-logo .title {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .sidebar-logo .subtitle {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sidebar-section {
    padding: 1rem 1.25rem 0.4rem;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 1.25rem;
    font-size: 13.5px;
    color: var(--text-2);
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .sidebar-item i { font-size: 16px; }

  .sidebar-subject {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 1.25rem;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .sidebar-subject:hover { color: var(--text); }
  .sidebar-subject.active { color: var(--text); font-weight: 500; }
  .sidebar-subject-wrap {
    display: flex; align-items: center; gap: 0;
    border-radius: 8px;
  }
  .sidebar-subject-wrap:hover .sidebar-subj-del { opacity: 1; }
  .sidebar-subject-wrap .sidebar-subject {
    flex: 1; border-radius: 8px 0 0 8px;
  }
  .sidebar-subject-wrap .sidebar-subject:only-child { border-radius: 8px; }
  .sidebar-subj-del {
    flex-shrink: 0; opacity: 0; transition: opacity .15s, color .15s, background .15s;
    width: 24px; height: 100%; min-height: 32px;
    border: none; background: transparent; color: var(--text-3);
    cursor: pointer; font-size: 12px; border-radius: 0 8px 8px 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .sidebar-subj-del:hover { color: #e53e3e; background: #fff0f0; opacity: 1; }
  .sidebar-add-subject {
    display: flex; align-items: center; gap: 7px;
    width: 100%; text-align: left;
    padding: 7px 10px; border: 1.5px dashed var(--border);
    border-radius: 8px; background: transparent; color: var(--text-3);
    font-size: 13px; cursor: pointer; margin-top: 6px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .sidebar-add-subject:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .sidebar-add-subject i { font-size: 14px; }

  /* Subject picker modal */
  .subj-picker-search {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none;
    background: var(--bg); color: var(--text);
  }
  .subj-picker-search:focus { border-color: var(--accent); }
  .subj-picker-list {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 340px; overflow-y: auto;
  }
  .subj-picker-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13.5px; color: var(--text); transition: background .12s;
  }
  .subj-picker-item:hover { background: var(--accent-light); color: var(--accent); }
  .subj-picker-item.already-added { opacity: .38; pointer-events: none; }
  .subj-picker-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .subj-picker-group { font-size: 10.5px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-3); padding: 8px 10px 3px; }

  /* Confirm delete modal */
  .confirm-modal { text-align: center; padding: 8px 0 4px; }
  .confirm-modal .confirm-icon { font-size: 36px; margin-bottom: 10px; }
  .confirm-modal h3 { font-size: 16px; margin-bottom: 8px; }
  .confirm-modal p { font-size: 13.5px; color: var(--text-2); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-danger-solid { background: #e53e3e; color: #fff; border: none; padding: 9px 22px;
    border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-danger-solid:hover { opacity: .88; }
  .sidebar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--sidebar-border);
  }
  .stats-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .stat-mini { text-align: center; background: var(--bg); border-radius: 6px; padding: 5px 2px; }
  .stat-mini-num { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-mini-label { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

  /* ── Main ── */
  .main { margin-left: 220px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    position: sticky; top: 0; z-index: 5;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0.875rem 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar h1 { font-size: 17px; font-weight: 500; flex: 1; }

  .search-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-wrap i {
    position: absolute;
    left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 15px;
    color: var(--text-3);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    font-size: 13.5px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--card);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-3); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    font-size: 13.5px; font-weight: 500;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1e3d80; border-color: #1e3d80; }
  .btn-danger { color: #c0392b; border-color: rgba(192,57,43,0.25); background: rgba(192,57,43,0.04); }
  .btn-danger:hover { background: rgba(192,57,43,0.1); }

  /* ── Content ── */
  .content { padding: 1.75rem 2rem; flex: 1; }

  /* ── Cards ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .vocab-grid    { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .formula-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.2rem;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); border-color: #c5cad6; }

  .card-stripe {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .card-stripe.jpn  { background: var(--jpn); }
  .card-stripe.eng  { background: var(--eng); }
  .card-stripe.math { background: var(--math); }
  .card-stripe.phys { background: var(--phys); }
  .card-stripe.ess  { background: var(--ess); }
  .card-stripe.geo  { background: var(--geo); }
  .card-stripe.tok  { background: var(--tok); }
  .card-stripe.ee   { background: var(--ee); }
  .card-stripe.cas  { background: var(--cas); }
  .card-stripe.univ { background: var(--univ); }

  .card-sub {
    font-size: 10.5px; font-weight: 500; letter-spacing: 0.07em;
    text-transform: uppercase; margin-top: 2px; margin-bottom: 6px;
  }
  .card-sub.jpn  { color: var(--jpn); }
  .card-sub.eng  { color: var(--eng); }
  .card-sub.math { color: var(--math); }
  .card-sub.phys { color: var(--phys); }
  .card-sub.ess  { color: var(--ess); }
  .card-sub.geo  { color: var(--geo); }
  .card-sub.tok  { color: var(--tok); }
  .card-sub.ee   { color: var(--ee); }
  .card-sub.cas  { color: var(--cas); }
  .card-sub.univ { color: var(--univ); }

  .card-title { font-size: 14.5px; font-weight: 500; line-height: 1.4; margin-bottom: 7px; }
  .card-preview { font-size: 12.5px; color: var(--text-2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .vocab-term  { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
  .vocab-def   { font-size: 12.5px; color: var(--text-2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .vocab-ex    { font-size: 11.5px; color: var(--text-3); margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .formula-name  { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
  .formula-expr  {
    font-family: 'Courier New', monospace;
    font-size: 14px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    border-radius: var(--radius-md);
    padding: 7px 11px; margin-bottom: 7px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .formula-desc  { font-size: 12.5px; color: var(--text-2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .formula-unit  { font-size: 11.5px; color: var(--text-3); margin-top: 5px; }
  .detail-formula-expr {
    font-family: 'Courier New', monospace;
    font-size: 17px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    border-radius: var(--radius-md);
    padding: 13px 16px; margin-bottom: 1.1rem;
    word-break: break-all; line-height: 1.6;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .card-date { font-size: 11px; color: var(--text-3); }
  .card-actions { display: flex; gap: 4px; }
  .card-group {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 500; color: var(--accent);
    background: var(--accent-light); border-radius: 20px;
    padding: 2px 9px; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-group i { font-size: 11px; flex-shrink: 0; }
  .card-groups { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }

  /* ── Tag input (multi-group chips) ── */
  .tag-input-box {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    width: 100%; min-height: 42px;
    padding: 6px 8px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg); color: var(--text);
    cursor: text;
    transition: border-color 0.15s;
  }
  .tag-input-box:focus-within { border-color: var(--accent); }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12.5px; font-weight: 500;
    background: var(--accent-light); color: var(--accent);
    border-radius: 20px; padding: 4px 6px 4px 11px;
    white-space: nowrap;
  }
  .tag-chip button {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    border: none; background: rgba(42,82,160,0.15); color: var(--accent);
    font-size: 11px; line-height: 1; cursor: pointer; padding: 0;
    transition: background 0.12s;
  }
  .tag-chip button:hover { background: rgba(42,82,160,0.3); }
  .tag-input-field {
    flex: 1 1 80px; min-width: 80px;
    border: none; outline: none; background: transparent;
    font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text);
    padding: 4px 2px;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-3); font-size: 15px;
    padding: 3px 5px; border-radius: 5px;
    transition: all 0.12s; line-height: 1;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-2); }
  .icon-btn.del:hover { color: #c0392b; background: rgba(192,57,43,0.08); }

  .add-card {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 7px; min-height: 130px;
    color: var(--text-3); background: transparent;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; padding: 1rem;
  }
  .add-card:hover { border-color: var(--accent); color: var(--text-2); background: var(--accent-light); }
  .add-card i { font-size: 22px; }
  .add-card span { font-size: 13px; }

  /* ── Drag-to-reorder (Manual mode) ── */
  .dragmode .card { cursor: grab; }
  .dragmode .card:active { cursor: grabbing; }
  .sortable-ghost   { opacity: 0.35; }
  .sortable-chosen  { box-shadow: var(--shadow-lg); }
  .sortable-drag    { box-shadow: var(--shadow-lg); }
  .drag-hint {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-3);
    margin-bottom: 12px;
  }
  .drag-hint i { font-size: 14px; }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--text-3); }
  .empty i { font-size: 48px; display: block; margin-bottom: 1rem; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .modal {
    background: var(--card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 1.75rem;
    width: 100%;
    max-width: 560px;
    box-shadow: var(--shadow-lg);
    margin: auto;
    position: relative;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.4rem;
  }
  .modal-header h2 { font-size: 17px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 18px; padding: 2px; }
  .modal-close:hover { color: var(--text); }

  .form-row { margin-bottom: 1.1rem; }
  .form-row label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); letter-spacing: 0.05em; margin-bottom: 5px; text-transform: uppercase; }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%; padding: 9px 12px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s; resize: vertical;
  }
  .form-row input:focus,
  .form-row textarea:focus,
  .form-row select:focus { border-color: var(--accent); }
  .form-row textarea { min-height: 100px; line-height: 1.65; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.4rem; }

  /* Detail modal */
  .detail-sub-badge {
    display: inline-block;
    font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
    background: var(--bg); color: var(--text-2);
    margin-bottom: 0.75rem;
  }
  .detail-title { font-size: 20px; font-weight: 500; line-height: 1.35; margin-bottom: 1.25rem; }
  .detail-section { margin-bottom: 1.1rem; }
  .detail-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .detail-body { font-size: 14.5px; line-height: 1.75; white-space: pre-wrap; color: var(--text); }
  .keypills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .keypill {
    padding: 3px 11px; font-size: 12px;
    border-radius: 20px; background: var(--accent-light);
    color: var(--accent);
  }
  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  /* Quiz / Flashcard mode */
  .flash-wrap { max-width: 500px; margin: 3rem auto; text-align: center; }
  .flash-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 2.5rem 2rem;
    box-shadow: var(--shadow-lg); min-height: 200px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s;
  }
  .flash-card:hover { transform: scale(1.01); }
  .flash-subject { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.75rem; }
  .flash-term { font-size: 26px; font-weight: 500; line-height: 1.3; }
  .flash-def { font-size: 15px; color: var(--text-2); line-height: 1.7; }
  .flash-hint { font-size: 12px; color: var(--text-3); margin-top: 1.5rem; }
  .flash-controls { display: flex; gap: 10px; justify-content: center; margin-top: 1.5rem; }
  .flash-progress { font-size: 13px; color: var(--text-3); margin-bottom: 1.5rem; }

  /* ── Format toolbar ── */
  .fmt-wrap { position: relative; }
  .fmt-toolbar {
    display: flex; gap: 2px; padding: 4px 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-bottom: none; border-radius: var(--radius-md) var(--radius-md) 0 0;
  }
  .fmt-wrap textarea {
    border-radius: 0 0 var(--radius-md) var(--radius-md) !important;
  }
  .fmt-btn {
    padding: 3px 8px; font-size: 13px; font-weight: 500;
    border: none; background: transparent; cursor: pointer;
    border-radius: 4px; color: var(--text-2);
    font-family: 'DM Sans', sans-serif; line-height: 1.4;
    transition: background 0.12s, color 0.12s;
  }
  .fmt-btn:hover { background: var(--card); color: var(--text); }
  .fmt-btn.bold { font-weight: 700; }
  .fmt-btn.strike { text-decoration: line-through; }
  .fmt-sep { width: 1px; background: var(--border); margin: 3px 2px; }

  .sidebar-io-btn {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    padding: 7px 8px;
    font-size: 12px; font-weight: 500;
    border: 1px solid var(--sidebar-border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text-2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    text-align: center;
  }
  .sidebar-io-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .sidebar-io-btn i { font-size: 13px; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sidebar { width: 0; overflow: hidden; }
    .main { margin-left: 0; }
    .topbar { padding: 0.75rem 1rem; }
    .content { padding: 1.25rem 1rem; }
  }

  /* ── Auth / Login screen ── */
  #auth-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 44px 40px 40px;
    width: 100%; max-width: 380px; text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.09);
  }
  .auth-logo { font-size: 32px; margin-bottom: 10px; }
  .auth-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .auth-card .auth-sub { font-size: 13.5px; color: var(--text-2); margin-bottom: 28px; }
  .auth-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0; color: var(--text-3); font-size: 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .auth-input {
    width: 100%; padding: 10px 13px; margin-bottom: 10px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; background: var(--bg); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .auth-input:focus { border-color: var(--accent); }
  .btn-google {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-google:hover { background: var(--bg); border-color: var(--accent); }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .btn-auth-primary {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity .15s; margin-bottom: 8px;
  }
  .btn-auth-primary:hover { opacity: .88; }
  .auth-toggle { font-size: 13px; color: var(--text-2); margin-top: 12px; }
  .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500; }
  .auth-toggle a:hover { text-decoration: underline; }
  .auth-error {
    font-size: 13px; color: #e53e3e; background: #fff0f0;
    border: 1px solid #fca5a5; border-radius: 8px;
    padding: 8px 12px; margin-bottom: 10px; display: none;
  }
  #auth-screen.hidden { display: none; }

  /* ── User avatar in topbar ── */
  .topbar-user {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 13px; color: var(--text-2); transition: background .15s;
    white-space: nowrap; max-width: 160px;
  }
  .topbar-user:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .topbar-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .topbar-user-name { overflow: hidden; text-overflow: ellipsis; }
  .topbar-sync {
    font-size: 11px; color: var(--text-3);
    display: flex; align-items: center; gap: 4px;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; flex-shrink: 0;
  }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error   { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

</head>
<body>

<!-- ── Auth / Login screen ─────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">📚</div>
    <h1>IB Study Notebook</h1>
    <p class="auth-sub">Sign in to sync your notes across devices</p>

    <!-- Google sign-in -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>

      <a style="font-size:12px;color:var(--text-3);cursor:pointer;" onclick="sendPasswordReset()">Forgot password?</a>

</div>

<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="title">IB Study<br>Notebook</div>

    <button class="sidebar-item" onclick="setTab('formula')" id="nav-formula">

    </button>

    <button class="sidebar-subject active" onclick="setSubject('all')" id="subj-all">

    <div class="sidebar-bottom">

        <div class="stat-mini">
          <div class="stat-mini-num" id="stat-formulas">0</div>
          <div class="stat-mini-label">Formulas</div>

      <div style="display:flex;gap:6px;margin-top:12px;">

        <label class="sidebar-io-btn" title="Import data from JSON file" style="cursor:pointer;">

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <h1 id="topbar-title">Case Studies</h1>
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" class="search-input" id="search-input" placeholder="Search..." oninput="render()" />
      </div>
      <select class="btn" id="group-filter" onchange="render()" title="Filter by group" style="padding:8px 10px;">
        <option value="">All Groups</option>
      </select>
      <button class="btn" id="sort-btn" onclick="toggleSort()" title="Sort order">

<!-- Modal container -->
<div id="modal-container"></div>
<datalist id="group-suggestions"></datalist>

<script>
// ═════════════════════════════════════════════
// Firebase configuration
// ─────────────────────────────────────────────
// Replace the values below with your own Firebase project settings.
// Get them from: Firebase Console → Project Settings → Your apps → SDK setup.
// ─────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAI1RdaXEBfxHUOmJtEpELN5uVWZdNKXeA",
  authDomain:        "ibstudy-notebook.firebaseapp.com",
  projectId:         "ibstudy-notebook",
  storageBucket:     "ibstudy-notebook.firebasestorage.app",
  messagingSenderId: "546390368913",
  appId:             "1:546390368913:web:18e083125a9f156ff35530",
  measurementId:     "G-PSXLFPFQ2Z",
};

// ── Firebase init ──────────────────────────────────────────
// Wrapped in try/catch so that if the SDK hasn't loaded (e.g. opened as
// a local file:// or CDN blocked), the app still runs in localStorage mode.
let fbAuth = null, fbDb = null, fbAnalytics = null;
let _firebaseReady = false;

try {
  firebase.initializeApp(FIREBASE_CONFIG);
  fbAuth      = firebase.auth();
  fbDb        = firebase.firestore();
  try { fbAnalytics = firebase.analytics(); } catch(e) { /* analytics optional */ }
  _firebaseReady = true;
} catch (e) {
  console.warn('Firebase failed to initialise — running in offline (localStorage) mode.', e);
}

// ── Auth state ─────────────────────────────────────────────
let currentUser = null;
let authMode    = 'signin';

function onUserSignedIn(user) {
  currentUser = user;
  document.getElementById('auth-screen').classList.add('hidden');
  updateUserWidget(user);
  loadFromFirestore();
}

function onUserSignedOut() {
  currentUser = null;
  updateUserWidget(null);
  document.getElementById('auth-screen').classList.remove('hidden');
  state.cases = []; state.vocabs = []; state.formulas = [];
  state.exams = []; state.others = []; state.subjects = [...DEFAULT_SUBJECTS];
  render();
}

if (_firebaseReady && fbAuth) {
  fbAuth.onAuthStateChanged(user => {
    if (user) onUserSignedIn(user);
    else      onUserSignedOut();
  });
} else {
  // No Firebase — skip login screen and go straight to localStorage mode
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('sync-label').textContent = 'Local only';
  document.getElementById('sync-dot').style.background = '#aab2c0';
}

// ── User widget ────────────────────────────────────────────
function updateUserWidget(user) {
  const avatarEl = document.getElementById('user-avatar');
  const nameEl   = document.getElementById('user-name');
  if (!user) {
    avatarEl.innerHTML = '?'; nameEl.textContent = 'Not signed in'; return;
  }
  const displayName = user.displayName || user.email || 'User';
  nameEl.textContent = displayName.split('@')[0]; // trim email domain
  if (user.photoURL) {
    avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
  } else {
    avatarEl.textContent = (displayName[0] || '?').toUpperCase();
  }
}

function setSyncStatus(status) {
  // status: 'synced' | 'syncing' | 'error' | 'offline'
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  const map = {
    synced:  ['',         'Synced'],
    syncing: ['syncing',  'Saving…'],
    error:   ['error',    'Error'],
    offline: ['',         'Offline'],
  };
  const [cls, text] = map[status] || map.synced;
  dot.className = 'sync-dot' + (cls ? ' '+cls : '');
  label.textContent = text;
  dot.style.background = status === 'synced'  ? '#22c55e'
                       : status === 'syncing' ? '#f59e0b'
                       : status === 'error'   ? '#ef4444'
                       :                        '#aab2c0';
}

function openUserMenu() {
  if (!currentUser) return;
  const email = currentUser.email || '';
  const name  = currentUser.displayName || email;
  showModal(`
    <div class="modal-header">
      <h2>Account</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;align-items:center;gap:14px;padding:12px 0 20px;">
      <div class="topbar-avatar" style="width:48px;height:48px;font-size:20px;flex-shrink:0;">
        ${currentUser.photoURL ? `<img src="${currentUser.photoURL}" alt="">` : (name[0]||'?').toUpperCase()}
      </div>
      <div>
        <div style="font-weight:600;font-size:15px;">${esc(name)}</div>
        <div style="font-size:12.5px;color:var(--text-2);">${esc(email)}</div>
      </div>
    </div>
    <div class="modal-actions" style="justify-content:flex-start;gap:8px;">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-danger" onclick="signOutUser()"><i class="ti ti-logout"></i> Sign Out</button>
    </div>
  `);
}

// ── Google sign-in ─────────────────────────────────────────
function signInWithGoogle() {
  if (!fbAuth) { showAuthError('Firebase is not available in this environment.'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(err => showAuthError(err.message));
}

// ── Email / password ───────────────────────────────────────
function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  const isSignup = authMode === 'signup';
  document.getElementById('auth-submit-btn').textContent  = isSignup ? 'Create Account' : 'Sign In';
  document.getElementById('auth-toggle-text').innerHTML   = isSignup
    ? 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>'
    : 'Don\'t have an account? <a onclick="toggleAuthMode()">Sign up</a>';
  document.getElementById('auth-error').style.display = 'none';
}

function authSubmit() {
  if (!fbAuth) { showAuthError('Firebase is not available in this environment.'); return; }
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
  if (authMode === 'signup') {
    fbAuth.createUserWithEmailAndPassword(email, password)
      .catch(err => showAuthError(friendlyAuthError(err.code)));
  } else {
    fbAuth.signInWithEmailAndPassword(email, password)
      .catch(err => showAuthError(friendlyAuthError(err.code)));
  }
}

function sendPasswordReset() {
  if (!fbAuth) return;
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { showAuthError('Enter your email address first.'); return; }
  fbAuth.sendPasswordResetEmail(email)
    .then(() => showAuthError('Password reset email sent — check your inbox.', 'info'))
    .catch(err => showAuthError(friendlyAuthError(err.code)));
}

function signOutUser() {
  closeModal();
  if (fbAuth) fbAuth.signOut();
}

function showAuthError(msg, type='error') {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.color   = type === 'info' ? 'var(--accent)' : '#e53e3e';
  el.style.background = type === 'info' ? 'var(--accent-light)' : '#fff0f0';
  el.style.borderColor = type === 'info' ? 'var(--accent)' : '#fca5a5';
}

function friendlyAuthError(code) {
  const map = {
    'auth/user-not-found':      'No account found with this email.',
    'auth/wrong-password':      'Incorrect password.',
    'auth/email-already-in-use':'This email is already registered.',
    'auth/invalid-email':       'Please enter a valid email address.',
    'auth/weak-password':       'Password must be at least 6 characters.',
    'auth/too-many-requests':   'Too many attempts. Please try again later.',
    'auth/popup-closed-by-user':'Sign-in popup was closed. Please try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Sign-in failed. Please try again.';
}

// ── Firestore sync ─────────────────────────────────────────
// All user data lives in a single document: users/{uid}/data/main
// This keeps reads/writes simple and avoids per-collection rules complexity.
let _saveTimer = null;

function userDocRef() {
  if (!currentUser || !fbDb) return null;
  return fbDb.collection('users').doc(currentUser.uid).collection('data').doc('main');
}

async function loadFromFirestore() {
  if (!currentUser || !fbDb) { load(); render(); return; }
  setSyncStatus('syncing');
  try {
    const ref  = userDocRef();
    const snap = await ref.get();
    if (snap.exists) {
      const d = snap.data();
      state.cases    = d.cases    || [];
      state.vocabs   = d.vocabs   || [];
      state.formulas = d.formulas || [];
      state.exams    = d.exams    || [];
      state.others   = d.others   || [];
      state.subjects = Array.isArray(d.subjects) && d.subjects.length ? d.subjects : [...DEFAULT_SUBJECTS];
    } else {
      // First sign-in: if there is localStorage data, offer to migrate it.
      loadFromLocalStorage();
      if (state.cases.length || state.vocabs.length || state.formulas.length ||
          state.exams.length  || state.others.length) {
        saveToFirestore(); // push local data up
      }
    }
    migrateExams(); migrateGroups();
    setSyncStatus('synced');
  } catch (err) {
    console.warn('Firestore load failed, falling back to localStorage:', err);
    loadFromLocalStorage();
    setSyncStatus('offline');
  }
  render();
}

function loadFromLocalStorage() {
  try { state.cases    = JSON.parse(localStorage.getItem('ib_cases')    || '[]'); } catch(e) { state.cases    = []; }
  try { state.vocabs   = JSON.parse(localStorage.getItem('ib_vocabs')   || '[]'); } catch(e) { state.vocabs   = []; }
  try { state.formulas = JSON.parse(localStorage.getItem('ib_formulas') || '[]'); } catch(e) { state.formulas = []; }
  try { state.exams    = JSON.parse(localStorage.getItem('ib_exams')    || '[]'); } catch(e) { state.exams    = []; }
  try { state.others   = JSON.parse(localStorage.getItem('ib_others')   || '[]'); } catch(e) { state.others   = []; }
  try {
    const saved = JSON.parse(localStorage.getItem('ib_subjects') || 'null');
    state.subjects = Array.isArray(saved) && saved.length ? saved : [...DEFAULT_SUBJECTS];
  } catch(e) { state.subjects = [...DEFAULT_SUBJECTS]; }
}

async function saveToFirestore() {
  if (!currentUser || !fbDb) return;
  setSyncStatus('syncing');
  try {
    await userDocRef().set({
      cases:    state.cases,
      vocabs:   state.vocabs,
      formulas: state.formulas,
      exams:    state.exams,
      others:   state.others,
      subjects: state.subjects,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setSyncStatus('synced');
  } catch (err) {
    console.warn('Firestore save failed:', err);
    setSyncStatus('error');
  }
}

// ─────────────────────────────────────────────
// Data helpers
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// Full IBDP subject catalog (all official subjects)
// Stored as { key, name, color, group } — used only for the picker modal.
// ─────────────────────────────────────────────
const IBDP_CATALOG = [

// Build lookup maps from catalog
const SUBJECT_NAMES = {};
const SUBJECT_COLORS = {};
IBDP_CATALOG.forEach(s => { SUBJECT_NAMES[s.key] = s.name; SUBJECT_COLORS[s.key] = s.color; });

// Default subjects active on first launch
const DEFAULT_SUBJECTS = ['tok','ee','cas'];

let state = {
  tab: 'case',
  subject: 'all',
  sort: 'manual',
  cases:    [],
  vocabs:   [],
  formulas: [],
  exams:    [],
  others:   [],
  subjects: null,
};

function load() {
  // Fallback only — main load path goes through loadFromFirestore() after auth.
  loadFromLocalStorage();
  migrateExams();
  migrateGroups();
}

// One-time migration: the single-value "group" field was upgraded to a
// "groups" array so each item can carry multiple tags. Convert any legacy
// string value into a one-element array (or empty array if absent) so
// existing data keeps working with the new multi-tag UI.
function migrateGroups() {
  let changed = false;
  [...state.cases, ...state.vocabs, ...state.formulas, ...state.exams].forEach(item => {
    if (!Array.isArray(item.groups)) {
      item.groups = (typeof item.group === 'string' && item.group.trim()) ? [item.group.trim()] : [];
      changed = true;
    }
    if ('group' in item) { delete item.group; changed = true; }
  });
  if (changed) save();
}

// One-time migration: merge any legacy "notes" field into "criteria"
// so existing entries keep their data after the two fields were combined.
function migrateExams() {
  let changed = false;
  state.exams.forEach(e => {
    if (e.notes && e.notes.trim()) {
      e.criteria = e.criteria && e.criteria.trim()
        ? e.criteria.trim() + '\n\n' + e.notes.trim()
        : e.notes.trim();
      delete e.notes;
      changed = true;
    } else if ('notes' in e) {
      delete e.notes;
      changed = true;
    }
  });
  if (changed) save();
}

function save() {
  // Write to localStorage as offline cache.
  localStorage.setItem('ib_cases',    JSON.stringify(state.cases));
  localStorage.setItem('ib_vocabs',   JSON.stringify(state.vocabs));
  localStorage.setItem('ib_formulas', JSON.stringify(state.formulas));
  localStorage.setItem('ib_exams',    JSON.stringify(state.exams));
  localStorage.setItem('ib_others',   JSON.stringify(state.others));
  localStorage.setItem('ib_subjects', JSON.stringify(state.subjects));
  // Debounce Firestore writes to avoid hammering on rapid edits.
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToFirestore, 800);
}

function esc(s) {
  return (s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Strip markdown markers for plain-text card previews
function stripMd(s) {
  return (s||'')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/~~(.+?)~~/g, '$1')
    .replace(/`(.+?)`/g, '$1');
}

// Render **bold**, ~~strike~~, `code` in detail views
function md(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/~~(.+?)~~/g, '<s>$1</s>')
    .replace(/`(.+?)`/g, '<code style="font-family:monospace;font-size:13px;background:var(--bg);padding:1px 5px;border-radius:3px;">$1</code>')
    .replace(/\n/g, '<br>');
}

function today() { return new Date().toISOString().slice(0,10); }
function uid()   { return Date.now() + Math.random().toString(36).slice(2,6); }

function applySortButton() {

function toggleSort() {

function getSorted(list) {
  // Manual : drag to set the order (the saved array order).
  // A→Z asc : alphabetical ascending by title/term/name.
  // Z→A desc: alphabetical descending (reversed).
  return state.sort === 'desc' ? [...list].reverse() : [...list];

function setTab(t) {

function setSubject(s) {

  document.getElementById('subj-all').classList.toggle('active', s === 'all');

    if (el) el.classList.toggle('active', k === s);

// ── Dynamic sidebar subject list ───────────────────────────
function subjectColor(key) {
  return SUBJECT_COLORS[key] || '#78909c';
}

function renderSubjectList() {
  const list = document.getElementById('subj-list');
  if (!list) return;
  list.innerHTML = '';
  state.subjects.forEach(key => {
    const name  = SUBJECT_NAMES[key] || key;
    const color = subjectColor(key);
    const wrap  = document.createElement('div');
    wrap.className = 'sidebar-subject-wrap';

    const btn = document.createElement('button');
    btn.className = 'sidebar-subject' + (state.subject === key ? ' active' : '');
    btn.id = 'subj-' + key;
    btn.innerHTML = `<span class="sidebar-dot" style="background:${color}"></span> ${esc(name)}`;
    btn.addEventListener('click', () => setSubject(key));

    const del = document.createElement('button');
    del.className = 'sidebar-subj-del';
    del.title = `Remove ${name}`;
    del.innerHTML = '✕';
    del.addEventListener('click', (e) => { e.stopPropagation(); confirmDeleteSubject(key); });

    wrap.appendChild(btn);
    wrap.appendChild(del);
    list.appendChild(wrap);
  });
}

function filterSubjectPicker() {
  renderSubjectPicker(document.getElementById('subj-search').value);
}

function renderSubjectPicker(q) {
  const container = document.getElementById('subj-picker-list');
  if (!container) return;
  const query = q.trim().toLowerCase();
  let html = '';
  let lastGroup = null;
  IBDP_CATALOG.forEach(s => {
    const match = !query ||
      s.name.toLowerCase().includes(query) ||
      s.group.toLowerCase().includes(query) ||
      s.key.toLowerCase().includes(query);
    if (!match) return;
    if (s.group !== lastGroup) {
      html += `<div class="subj-picker-group">${esc(s.group)}</div>`;
      lastGroup = s.group;
    }
    const added = state.subjects.includes(s.key);
    html += `<div class="subj-picker-item${added ? ' already-added' : ''}"
               onclick="addSubject('${s.key}')">
      <span class="subj-picker-dot" style="background:${s.color}"></span>
      <span>${esc(s.name)}</span>
      ${added ? '<span style="margin-left:auto;font-size:12px;color:var(--text-3);">Added</span>' : ''}
    </div>`;
  });
  if (!html) html = `<p style="padding:16px;text-align:center;color:var(--text-3);font-size:13px;">No subjects found for "${esc(q)}"</p>`;
  container.innerHTML = html;
}

function addSubject(key) {
  if (state.subjects.includes(key)) return;
  state.subjects.push(key);
  save();
  renderSubjectList();
  // Refresh the picker to mark this item as added
  const q = document.getElementById('subj-search');
  if (q) renderSubjectPicker(q.value);
  updateStats();
}

// ── Delete Subject confirmation ────────────────────────────
function confirmDeleteSubject(key) {
  const name = SUBJECT_NAMES[key] || key;
  const color = subjectColor(key);
  // Count how many items use this subject
  const count = [
    ...state.cases, ...state.vocabs, ...state.formulas, ...state.exams
  ].filter(item => item.subject === key).length;

  const warn = count > 0
    ? `<p style="color:#e53e3e;font-size:13px;margin-bottom:6px;">
        ⚠️ ${count} item${count>1?'s':''} assigned to this subject will lose their subject label.
       </p>`
    : '';

  showModal(`
    <div class="confirm-modal">
      <div class="confirm-icon">🗑️</div>
      <h3>Remove "${esc(name)}"?</h3>
      <p>This will remove <strong>${esc(name)}</strong> from your subject filter.<br>
         Items assigned to it will not be deleted.</p>
      ${warn}
      <div class="confirm-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn-danger-solid" onclick="deleteSubject('${key}')">Remove Subject</button>
      </div>
    </div>
  `);
}

function deleteSubject(key) {
  state.subjects = state.subjects.filter(k => k !== key);
  if (state.subject === key) { state.subject = 'all'; }
  save();
  renderSubjectList();
  setSubject(state.subject);
  closeModal();
  updateStats();
}

// ─────────────────────────────────────────────
// Groups (tag-like grouping across all content types)
// ─────────────────────────────────────────────
// "groups" is an array of free-text labels the user assigns when adding/
// editing any item (Case, Vocab, Formula, Exam). Multiple items sharing a
// group name belong to that group, and the group filter dropdown lets the
// user quickly narrow the current tab down to just that group.
// Render a row of small group-tag chips for card grids and detail modals.
function groupChipsHTML(groups, variant) {
  if (!groups || !groups.length) return '';
  if (variant === 'detail') {
    return groups.map(g =>
      `<span class="detail-sub-badge" style="background:var(--accent-light);color:var(--accent);"><i class="ti ti-tag"></i> ${esc(g)}</span>`
    ).join('');
  }
  return `<div class="card-groups">${groups.map(g =>
    `<span class="card-group"><i class="ti ti-tag"></i>${esc(g)}</span>`
  ).join('')}</div>`;
}

function allGroups() {
  const s = new Set();
  [...state.cases, ...state.vocabs, ...state.formulas, ...state.exams, ...state.others].forEach(item => {
    (item.groups||[]).forEach(g => { if (g && g.trim()) s.add(g.trim()); });
  });
  return [...s].sort((a, b) => a.localeCompare(b, 'ja'));
}

function refreshGroupFilter() {
  const sel = document.getElementById('group-filter');
  if (!sel) return;
  const current = sel.value;
  const groups = allGroups();
  sel.innerHTML = `<option value="">All Groups</option>` +
    groups.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
  // Keep the previous selection if it still exists, otherwise reset to "All".
  sel.value = groups.includes(current) ? current : '';
}

function getFiltered(list, isCase) {
  const q = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
  const g = (document.getElementById('group-filter')?.value||'').trim();
  return list.filter(item => {
    if (state.subject !== 'all' && item.subject !== state.subject) return false;
    if (g && !(item.groups||[]).includes(g)) return false;
    if (!q) return true;
    const text = isCase
      ? [item.title, item.content, item.keyPoints, ...(item.groups||[])].join(' ').toLowerCase()
      : [item.term, item.definition, item.example, ...(item.groups||[])].join(' ').toLowerCase();
    return text.includes(q);
  });
}

// ── Tag-input widget ───────────────────────────────────────
// Renders a wide chip-style box where the user types a group name and
// presses Enter/Comma to add it as a tag. Backspace on an empty field
// removes the last tag. State is tracked in-memory per open form via a
// data attribute on the box, and read back out at save time.
function renderTagChips(boxId, tags) {
  const box = document.getElementById(boxId);
  if (!box) return;
  const field = box.querySelector('.tag-input-field');
  box.querySelectorAll('.tag-chip').forEach(el => el.remove());
  tags.forEach((tag, idx) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `<span></span><button type="button" aria-label="Remove">✕</button>`;
    chip.querySelector('span').textContent = tag;
    chip.querySelector('button').addEventListener('click', () => {
      tags.splice(idx, 1);
      renderTagChips(boxId, tags);
      field.focus();
    });
    box.insertBefore(chip, field);
  });
}

function initTagInput(boxId, initialTags) {
  const tags = [...(initialTags||[])];
  const box = document.getElementById(boxId);
  if (!box) return tags;
  const field = box.querySelector('.tag-input-field');

  function addFromField() {
    const v = field.value.trim();
    if (v && !tags.includes(v)) { tags.push(v); }
    field.value = '';
    renderTagChips(boxId, tags);
  }

  field.addEventListener('keydown', ev => {
    if (ev.key === 'Enter' || ev.key === ',') {
      ev.preventDefault();
      addFromField();
    } else if (ev.key === 'Backspace' && !field.value && tags.length) {
      tags.pop();
      renderTagChips(boxId, tags);
    }
  });
  field.addEventListener('blur', addFromField);
  box.addEventListener('click', () => field.focus());

  renderTagChips(boxId, tags);
  return tags;
}

// Read out the current tags from a tag-input box at save time, including
// any text still sitting in the input field that the user didn't press
// Enter/Comma on (so a forgotten last tag isn't silently dropped).
function readTagBox(boxId) {
  const box = document.getElementById(boxId);
  if (!box) return [];
  const tags = [...box.querySelectorAll('.tag-chip > span')].map(el => el.textContent);
  const field = box.querySelector('.tag-input-field');
  const pending = field ? field.value.trim() : '';
  if (pending && !tags.includes(pending)) tags.push(pending);
  return tags;
}

// ─────────────────────────────────────────────
// Drag-to-reorder (SortableJS) — active only in Manual sort mode
// ─────────────────────────────────────────────
let sortableInstance = null;
const TYPE_KEY = { case:'cases', vocab:'vocabs', formula:'formulas', exam:'exams', others:'others' };

function destroySortable() {
  if (sortableInstance) {
    try { sortableInstance.destroy(); } catch(e) {}
    sortableInstance = null;
  }
}

function enableDrag(type) {
  if (state.sort !== 'manual') return;
  if (typeof Sortable === 'undefined') return;       // CDN unavailable → app still works, just no drag
  const grid = document.getElementById('sortable-grid');
  if (!grid) return;
  grid.classList.add('dragmode');
  sortableInstance = new Sortable(grid, {
    animation: 150,              // surrounding cards slide into place (Puzzle&Dragons-style)
    draggable: '.card',
    filter: '.add-card',         // the "Add" tile is not draggable
    delay: 150,                  // press-and-hold on touch so normal swipes still scroll
    delayOnTouchOnly: true,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    onEnd: () => {
      const ids = [...grid.querySelectorAll('.card')].map(el => el.dataset.id);
      reorderByVisible(type, ids);
    }
  });
}

// Reorder the full array using the new order of the currently *visible* cards,
// keeping hidden (filtered-out) items in their original slots.
function reorderByVisible(type, newVisibleIds) {
  const key = TYPE_KEY[type];
  const arr = state[key];
  if (!arr) return;
  const visibleSet = new Set(newVisibleIds);
  const slotCount = arr.reduce((n, i) => n + (visibleSet.has(i.id) ? 1 : 0), 0);
  if (slotCount !== newVisibleIds.length) { render(); return; }   // mismatch → restore from data
  const byId = {};
  arr.forEach(x => { byId[x.id] = x; });
  let p = 0;
  const result = arr.map(item => visibleSet.has(item.id) ? byId[newVisibleIds[p++]] : item);
  state[key] = result;
  save();
  // DOM already reflects the new order, so no re-render is needed here.
}

const DRAG_HINT = `<div class="drag-hint"><i class="ti ti-arrows-move"></i> Drag cards to reorder — this Manual order is saved</div>`;

function render() {
  destroySortable();
  updateStats();
  refreshGroupFilter();
  const t = state.tab;
  if      (t==='case')    renderCases();
  else if (t==='vocab')   renderVocabs();
  else if (t==='formula') renderFormulas();
  else if (t==='exam')    renderExams();
  else if (t==='others')  renderOthers();
}

function updateStats() {
  document.getElementById('stat-cases').textContent    = state.cases.length;
  document.getElementById('stat-vocabs').textContent   = state.vocabs.length;
  document.getElementById('stat-formulas').textContent = state.formulas.length;
  document.getElementById('stat-subjs').textContent    = state.subjects.length;
  renderSubjectList();
}

function renderCases() {
  const items = getSorted(getFiltered(state.cases, true));

  if (!state.cases.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-files"></i><p>No case studies yet.<br>Press "Add" to create your first note.</p></div>`;
    return;
  }
  const cards = items.length
    ? items.map(c => `
      <div class="card" data-id="${c.id}" onclick="openCaseDetail('${c.id}')">
        <div class="card-stripe ${c.subject}"></div>
        <div class="card-sub ${c.subject}">${SUBJECT_NAMES[c.subject]||c.subject}</div>
        ${groupChipsHTML(c.groups)}
        <div class="card-title">${esc(c.title)}</div>
        <div class="card-preview">${esc(stripMd(c.content))}</div>
        <div class="card-footer">
          <span class="card-date">${c.date||''}</span>
          <div class="card-actions">
            <button class="icon-btn" onclick="event.stopPropagation();openEditCase('${c.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
            <button class="icon-btn del" onclick="event.stopPropagation();deleteCase('${c.id}')" title="Delete"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>`).join('')
    : `<div class="empty" style="grid-column:1/-1"><p>No results found</p></div>`;
  el.innerHTML = `${state.sort==='manual'?DRAG_HINT:''}<div class="cards-grid" id="sortable-grid">
    ${cards}
    <button class="add-card" onclick="openAdd()"><i class="ti ti-plus"></i><span>Add Case Study</span></button>
  </div>`;
  enableDrag('case');
}

function renderVocabs() {
  const items = getSorted(getFiltered(state.vocabs, false));
  const el = document.getElementById('main-content');
  if (!state.vocabs.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-vocabulary"></i><p>No vocabulary yet.<br>Press "Add" to add your first term.</p></div>`;
    return;
  }
  const cards = items.length

// ─────────────────────────────────────────────
// Flashcard mode
// ─────────────────────────────────────────────
let flashState = { deck: [], idx: 0, flipped: false };

function renderFlash() {
  const el = document.getElementById('main-content');
  let deck = state.vocabs.filter(v => state.subject==='all' || v.subject===state.subject);
  if (!deck.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-cards"></i><p>Please add Vocabulary entries first.</p></div>`;
    return;
  }
  // shuffle
  deck = [...deck].sort(() => Math.random()-0.5);
  flashState = { deck, idx: 0, flipped: false };
  renderFlashCard(el);
}

function renderFlashCard(el) {
  const { deck, idx, flipped } = flashState;
  if (!el) el = document.getElementById('main-content');
  const v = deck[idx];
  el.innerHTML = `<div class="flash-wrap">
    <div class="flash-progress">${idx+1} / ${deck.length}</div>
    <div class="flash-card" onclick="flipCard()">
      ${!flipped ? `
        <div class="flash-subject">${SUBJECT_NAMES[v.subject]||v.subject}</div>
        <div class="flash-term">${esc(v.term)}</div>
        <div class="flash-hint">Click to reveal definition</div>
      ` : `
        <div class="flash-subject">${esc(v.term)}</div>
        <div class="flash-def">${esc(v.definition)}</div>
        ${v.example ? `<div class="flash-hint" style="margin-top:1rem;">${esc(v.example)}</div>` : ''}
      `}
    </div>
    <div class="flash-controls">
      <button class="btn" onclick="prevCard()" ${idx===0?'disabled':''}>
        <i class="ti ti-arrow-left"></i> Prev
      </button>
      <button class="btn" onclick="shuffleFlash()">
        <i class="ti ti-refresh"></i> Shuffle
      </button>
      <button class="btn btn-primary" onclick="nextCard()" ${idx===deck.length-1?'disabled':''}>
        Next <i class="ti ti-arrow-right"></i>
      </button>
    </div>
  </div>`;
}

function flipCard() {
  flashState.flipped = !flashState.flipped;
  renderFlashCard();
}
function nextCard() {
  if (flashState.idx < flashState.deck.length-1) { flashState.idx++; flashState.flipped=false; renderFlashCard(); }
}
function prevCard() {
  if (flashState.idx > 0) { flashState.idx--; flashState.flipped=false; renderFlashCard(); }
}
function shuffleFlash() {
  flashState.deck.sort(() => Math.random()-0.5);
  flashState.idx=0; flashState.flipped=false; renderFlashCard();
}

              <button class="icon-btn" onclick="event.stopPropagation();openEditExam('${e.id}')" title="Edit"><i class="ti ti-pencil"></i></button>
              <button class="icon-btn del" onclick="event.stopPropagation();deleteExam('${e.id}')" title="Delete"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        </div>`;
      }).join('')
    : `<div class="empty" style="grid-column:1/-1"><p>No results found</p></div>`;

  el.innerHTML = `${state.sort==='manual'?DRAG_HINT:''}<div class="cards-grid" id="sortable-grid">
    ${cards}
    <button class="add-card" onclick="openAdd()"><i class="ti ti-plus"></i><span>Add Exam</span></button>
  </div>`;
  enableDrag('exam');
}

function openAddExam(prefill={}) {
  const isEdit = !!prefill.id;
  const TYPES = ['Paper 1','Paper 2','Paper 3','IA','EE','IOC','HL Essay','SL Essay','Other'];
  const typeOpts = TYPES.map(t=>`<option value="${t}"${prefill.type===t?' selected':''}>${t}</option>`).join('');
  showModal(`
    <div class="modal-header">
      <h2>${isEdit?'Edit Exam & Criteria':'Add Exam & Criteria'}</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-row">
      <label>Subject</label>
      <select id="f-sub">${subjectOpts(prefill.subject || (state.subject !== 'all' ? state.subject : (state.subjects[0]||'eng')))}</select>
    </div>
    <div class="form-row">
      <label>Exam Type</label>
      <select id="f-type">${typeOpts}</select>
    </div>
    <div class="form-row">
      <label>Title / Component Name</label>
      <input type="text" id="f-title" value="${esc(prefill.title||'')}" placeholder="e.g. Paper 2 — Extended Response" />
    </div>
    <div class="form-row">
      <label>Marking Criteria and Note</label>
      <textarea id="f-criteria" style="min-height:150px;" placeholder="Enter each criterion, marks awarded, and key points, together with prep notes, strategy, and time-management tips...">${esc(prefill.criteria||'')}</textarea>
    </div>
    <div class="form-row">
      <label>Group <span style="text-transform:none;font-weight:400;color:var(--text-3);">— tag this item to a group (e.g. 坊っちゃん)</span></label>
      <div class="tag-input-box" id="f-group-box">
        <input type="text" class="tag-input-field" list="group-suggestions" placeholder="グループ名を入力して Enter" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExam('${prefill.id||''}')">Save</button>
    </div>
  `);
  document.getElementById('f-title').focus();
  initTagInput('f-group-box', prefill.groups);
}

function saveExam(editId) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a title'); return; }
  const item = {
    id:       editId || uid(),
    subject:  document.getElementById('f-sub').value,
    type:     document.getElementById('f-type').value,
    title,
    criteria: document.getElementById('f-criteria').value.trim(),
    groups:    readTagBox('f-group-box'),
    date:     editId ? (state.exams.find(e=>e.id===editId)||{}).date||today() : today(),
  };
  if (editId) { const i=state.exams.findIndex(e=>e.id===editId); if(i>-1) state.exams[i]=item; }
  else state.exams.unshift(item);
  save(); closeModal(); render();
}

function openEditExam(id) {
  const e = state.exams.find(x=>x.id===id); if(!e) return;
  openAddExam(e);
}

function deleteExam(id) {
  confirmDelete('Are you sure you want to delete this Exam & Criteria entry? This cannot be undone.', () => {
    state.exams = state.exams.filter(e => e.id !== id);
    save(); render();
  });
}

function openExamDetail(id) {
  const e = state.exams.find(x=>x.id===id); if(!e) return;
  showModal(`
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.6rem;">
      <span class="detail-sub-badge">${SUBJECT_NAMES[e.subject]||e.subject}</span>
      <span class="detail-sub-badge" style="background:var(--accent-light);color:var(--accent);">${esc(e.type)}</span>
      ${groupChipsHTML(e.groups, 'detail')}
    </div>
    <div class="detail-title">${esc(e.title)}</div>
    ${e.criteria ? `<div class="detail-section"><div class="detail-label">Marking Criteria and Note</div><div class="detail-body">${md(e.criteria)}</div></div>` : ''}
    <hr class="modal-divider" />
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <span style="font-size:12px;color:var(--text-3);">${e.date||''}</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-danger" onclick="deleteExam('${e.id}')"><i class="ti ti-trash"></i> Delete</button>
        <button class="btn" onclick="closeModal();openEditExam('${e.id}')"><i class="ti ti-pencil"></i> Edit</button>
        <button class="btn btn-primary" onclick="closeModal()">Close</button>
      </div>
    </div>
  `);
}


// ─────────────────────────────────────────────
// Others tab — catch-all for miscellaneous notes, links, and reference items
// ─────────────────────────────────────────────
function renderOthers() {
  const el = document.getElementById('main-content');
  const q  = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
  const g  = (document.getElementById('group-filter')?.value||'').trim();
  const items = getSorted(state.others.filter(o => {
    if (g && !(o.groups||[]).includes(g)) return false;
    if (!q) return true;
    return [o.title, o.body, o.url, ...(o.groups||[])].join(' ').toLowerCase().includes(q);
  }));

  if (!state.others.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-folder"></i><p>Nothing here yet.<br>Press "Add" to add a miscellaneous note or reference.</p></div>`;
    return;
  }

  const cards = items.length
    ? items.map(o => `
      <div class="card" data-id="${o.id}" onclick="openOtherDetail('${o.id}')">
        <div class="card-stripe" style="background:#78909c"></div>
        ${groupChipsHTML(o.groups)}
        <div class="card-title">${esc(o.title)}</div>
        ${o.body ? `<div class="card-preview">${esc(stripMd(o.body))}</div>` : ''}
        ${o.url  ? `<div style="font-size:11px;color:var(--accent);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🔗 ${esc(o.url)}</div>` : ''}
        <div class="card-footer">
          <span class="card-date">${o.date||''}</span>
          <div class="card-actions">
            <button class="icon-btn" onclick="event.stopPropagation();openAddOther(state.others.find(x=>x.id==='${o.id}'))" title="Edit"><i class="ti ti-pencil"></i></button>
            <button class="icon-btn del" onclick="event.stopPropagation();deleteOther('${o.id}')" title="Delete"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>`)
      .join('')
    : `<div class="empty" style="grid-column:1/-1"><p>No results found</p></div>`;

  el.innerHTML = `${state.sort==='manual'?DRAG_HINT:''}<div class="cards-grid" id="sortable-grid">
    ${cards}
    <button class="add-card" onclick="openAdd()"><i class="ti ti-plus"></i><span>Add</span></button>
  </div>`;
  enableDrag('others');
}

function openAddOther(prefill={}) {
  const isEdit = !!prefill.id;
  showModal(`
    <div class="modal-header">
      <h2>${isEdit ? 'Edit Item' : 'Add to Others'}</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-row">
      <label>Title *</label>
      <input type="text" id="f-title" value="${esc(prefill.title||'')}" placeholder="e.g. Useful reference, Link to resource…" />
    </div>
    <div class="form-row">
      <label>Body / Notes</label>
      <textarea id="f-body" style="min-height:130px;" placeholder="Write anything here — notes, summaries, references…">${esc(prefill.body||'')}</textarea>
    </div>
    <div class="form-row">
      <label>URL (optional)</label>
      <input type="url" id="f-url" value="${esc(prefill.url||'')}" placeholder="https://…" />
    </div>
    <div class="form-row">
      <label>Group <span style="text-transform:none;font-weight:400;color:var(--text-3);">— tag this item to one or more groups</span></label>
      <div class="tag-input-box" id="f-group-box">
        <input type="text" class="tag-input-field" list="group-suggestions" placeholder="Enter group name and press Enter" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveOther('${prefill.id||''}')">Save</button>
    </div>
  `);
  document.getElementById('f-title').focus();
  initTagInput('f-group-box', prefill.groups);
}

function saveOther(editId) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').classList.add('error'); return; }
  const item = {
    id:     editId || uid(),
    title,
    body:   document.getElementById('f-body').value.trim(),
    url:    document.getElementById('f-url').value.trim(),
    groups: readTagBox('f-group-box'),
    date:   editId ? (state.others.find(o=>o.id===editId)||{}).date||today() : today(),
  };
  if (editId) {
    const idx = state.others.findIndex(o => o.id === editId);
    if (idx !== -1) state.others[idx] = item; else state.others.push(item);
  } else {
    state.others.push(item);
  }
  save(); closeModal(); render();
}

function deleteOther(id) {
  confirmDelete('Are you sure you want to delete this item? This cannot be undone.', () => {
    state.others = state.others.filter(o => o.id !== id);
    save(); render();
  });
}

function openOtherDetail(id) {
  const o = state.others.find(x => x.id === id); if (!o) return;
  showModal(`
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    ${groupChipsHTML(o.groups, 'detail') ? `<div style="margin-bottom:.6rem;">${groupChipsHTML(o.groups,'detail')}</div>` : ''}
    <div class="detail-title">${esc(o.title)}</div>
    ${o.body ? `<div class="detail-section"><div class="detail-body">${md(o.body)}</div></div>` : ''}
    ${o.url  ? `<div class="detail-section"><div class="detail-label">Link</div>
                  <a href="${esc(o.url)}" target="_blank" rel="noopener noreferrer"
                     style="color:var(--accent);font-size:13.5px;word-break:break-all;">${esc(o.url)}</a></div>` : ''}
    <hr class="modal-divider" />
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <span style="font-size:12px;color:var(--text-3);">${o.date||''}</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-danger" onclick="deleteOther('${o.id}')"><i class="ti ti-trash"></i> Delete</button>
        <button class="btn" onclick="closeModal();openAddOther(state.others.find(x=>x.id==='${o.id}'))"><i class="ti ti-pencil"></i> Edit</button>
        <button class="btn btn-primary" onclick="closeModal()">Close</button>
      </div>
    </div>
  `);
}


function fmtWrap(marker, taId) {
  const ta = document.getElementById(taId);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.slice(start, end);
  if (!sel) return;
  const mlen = marker.length;
  if (sel.startsWith(marker) && sel.endsWith(marker) && sel.length > mlen * 2) {
    ta.setRangeText(sel.slice(mlen, sel.length - mlen), start, end, 'select');
  } else {
    ta.setRangeText(marker + sel + marker, start, end, 'select');
  }
  ta.focus();
}

function injectToolbars() {
  document.querySelectorAll('.form-row textarea').forEach(ta => {
    if (ta.parentElement.classList.contains('fmt-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'fmt-wrap';
    ta.parentNode.insertBefore(wrap, ta);
    const tid = ta.id;
    const bar = document.createElement('div');
    bar.className = 'fmt-toolbar';
    bar.innerHTML = `
      <button class="fmt-btn bold"   onmousedown="event.preventDefault();fmtWrap('**','${tid}')"  title="Bold"><b>B</b></button>
      <button class="fmt-btn strike" onmousedown="event.preventDefault();fmtWrap('~~','${tid}')"  title="Strikethrough"><s>S</s></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn"        onmousedown="event.preventDefault();fmtWrap('\`','${tid}')"  title="Inline code" style="font-family:monospace;font-size:12px;">{ }</button>
    `;
    wrap.appendChild(bar);
    wrap.appendChild(ta);
  });
}

function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
  injectToolbars();
  const dl = document.getElementById('group-suggestions');
  if (dl) dl.innerHTML = allGroups().map(g => `<option value="${esc(g)}"></option>`).join('');
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// Keyboard shortcut: Escape to close modal
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
});

// ─────────────────────────────────────────────
// Export / Import
// ─────────────────────────────────────────────
function exportData() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    subjects: state.subjects,
    cases:    state.cases,
    vocabs:   state.vocabs,
    formulas: state.formulas,
    exams:    state.exams,
    others:   state.others,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `ib-study-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cases && !data.vocabs && !data.formulas && !data.exams) {
        throw new Error('Invalid format');
      }
      showModal(`
        <div class="modal-header">
          <h2>Import Data</h2>
          <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
        </div>
        <p style="font-size:14px;color:var(--text-2);margin-bottom:0.75rem;">
          The backup file contains:
        </p>
        <div style="background:var(--bg);border-radius:var(--radius-md);padding:12px 16px;margin-bottom:1.25rem;display:flex;gap:1.5rem;">
          <div><span style="font-size:20px;font-weight:500;">${(data.cases||[]).length}</span><br><span style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Cases</span></div>
          <div><span style="font-size:20px;font-weight:500;">${(data.vocabs||[]).length}</span><br><span style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Vocab</span></div>
          <div><span style="font-size:20px;font-weight:500;">${(data.formulas||[]).length}</span><br><span style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Formulas</span></div>
          <div><span style="font-size:20px;font-weight:500;">${(data.exams||[]).length}</span><br><span style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Exams</span></div>
        </div>
        <p style="font-size:13px;color:var(--text-2);margin-bottom:1.5rem;">How would you like to import?</p>
        <div class="modal-actions" style="justify-content:flex-start;flex-wrap:wrap;gap:8px;">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="doImport(${JSON.stringify(data).replace(/"/g,'&quot;')}, 'merge')">
            <i class="ti ti-git-merge"></i> Merge with existing
          </button>
          <button class="btn btn-primary" onclick="doImport(${JSON.stringify(data).replace(/"/g,'&quot;')}, 'replace')">
            <i class="ti ti-replace"></i> Replace all data
          </button>
        </div>
      `);
    } catch(err) {
      showModal(`
        <div class="modal-header">
          <h2>Import Failed</h2>
          <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
        </div>
        <p style="font-size:14px;color:var(--text-2);margin-bottom:1.5rem;">
          The file could not be read. Make sure it is a valid IB Study Notebook backup (.json).
        </p>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="closeModal()">OK</button>
        </div>
      `);
    }
    // reset file input so the same file can be re-imported
    event.target.value = '';
  };
  reader.readAsText(file);
}

function doImport(data, mode) {
  if (mode === 'replace') {
    state.cases    = data.cases    || [];
    state.vocabs   = data.vocabs   || [];
    state.formulas = data.formulas || [];
    state.exams    = data.exams    || [];
    state.others   = data.others   || [];
    if (Array.isArray(data.subjects) && data.subjects.length) state.subjects = data.subjects;
  } else {
    const existingCaseIds    = new Set(state.cases.map(c => c.id));
    const existingVocabIds   = new Set(state.vocabs.map(v => v.id));
    const existingFormulaIds = new Set(state.formulas.map(f => f.id));
    const existingExamIds    = new Set(state.exams.map(e => e.id));
    const existingOtherIds   = new Set(state.others.map(o => o.id));
    (data.cases    || []).forEach(c => { if (!existingCaseIds.has(c.id))    state.cases.push(c);    });
    (data.vocabs   || []).forEach(v => { if (!existingVocabIds.has(v.id))   state.vocabs.push(v);   });
    (data.formulas || []).forEach(f => { if (!existingFormulaIds.has(f.id)) state.formulas.push(f); });
    (data.exams    || []).forEach(e => { if (!existingExamIds.has(e.id))    state.exams.push(e);    });
    (data.others   || []).forEach(o => { if (!existingOtherIds.has(o.id))   state.others.push(o);   });
    if (Array.isArray(data.subjects)) {
      data.subjects.forEach(k => { if (!state.subjects.includes(k)) state.subjects.push(k); });
    }
  }
  migrateExams();
  migrateGroups();
  save();
  closeModal();
  render();
}

// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
// ── Init ───────────────────────────────────────────────────
// onAuthStateChanged (above) drives data loading after sign-in.
// We just initialise the UI chrome here so it's ready before auth resolves.
applySortButton();
render(); // renders empty state; real data arrives via loadFromFirestore()
</script>
